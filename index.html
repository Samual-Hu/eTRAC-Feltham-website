<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Eyya Train Surface Viewer</title>
    <link rel="stylesheet" href="assets/styles.css">
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="index.html" aria-label="Eyya train surface viewer home">
        <img class="brand-mark" src="assets/eyya-brandmark.svg" alt="Eyya">
        <span class="brand-text">
          <span class="brand-title">Train Surface Viewer</span>
          <span class="brand-subtitle">701048 / one-side carriage review</span>
        </span>
      </a>
    </header>

    <main>
      <section class="viewer-shell" aria-label="Carriage panoramas">
        <div class="carriage-viewport" data-carriage-viewport tabindex="0">
          <div class="carriage-track" data-carriage-track></div>
        </div>
      </section>

      <section class="summary-section" aria-label="Carriage defect summary">
        <div class="summary-header">
          <h1>Carriage Defect Summary</h1>
          <p>Reviewed exterior surface defects</p>
        </div>

        <div class="table-wrap">
          <table class="condition-table">
            <thead>
              <tr>
                <th scope="col">Order</th>
                <th scope="col">Serial</th>
                <th scope="col">Dirt</th>
                <th scope="col">Scratch</th>
                <th scope="col">Graffiti</th>
              </tr>
            </thead>
            <tbody data-condition-table></tbody>
          </table>
        </div>
      </section>
    </main>

    <script src="assets/app.js"></script>
  </body>
</html>
